<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tile Frenzy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            width: 100dvw;
            height: 100dvh;
            margin: 0;
            padding: 0;
            background: #1a1640;
            /* background: #7b7b7c; */
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -khtml-user-select: none;
            -ms-user-select: none;
        }

        #game-container {
            width: 100dvw;
            height: 100dvh;
            align-items: center;
            justify-content: center;
        }

        @media (pointer: coarse) {
            #game-container { height: 95dvh; }
        }

        canvas {
            image-rendering: pixelated !important;
            image-rendering: crisp-edges !important;
        }

        /* JS sets display:flex/none — CSS just provides the base layout */
        #touch-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px;
            z-index: 100;
            pointer-events: none;
            opacity: 50%;
        }

        #toggle-controls {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 101;
            cursor: pointer;
            width: 70px;
            height: 40px;
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated;
            opacity: 50%;
        }

        #dpad-wrapper {
            display: flex;
            flex-direction: column;
            align-items: left;
            gap: 8px;
            pointer-events: all;
        }

        #btn-ff {
            width: 120px;
            cursor: pointer;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated;
        }

        #ff-img {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }

        #dpad {
            position: relative;
            width: 200px;
            height: 200px;
            pointer-events: all;
        }

        #dpad-img {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }

        .dpad-zone {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        #btn-up    { clip-path: polygon(50% 50%, 0% 0%, 100% 0%); }
        #btn-down  { clip-path: polygon(50% 50%, 0% 100%, 100% 100%); }
        #btn-left  { clip-path: polygon(50% 50%, 0% 0%, 0% 100%); }
        #btn-right { clip-path: polygon(50% 50%, 100% 0%, 100% 100%); }

        #action-btns {
            pointer-events: all;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn-swap {
            width: 172px;
            height: 120px;
            cursor: pointer;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        #swap-img {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>

    <div id="touch-controls">
        <div id="dpad-wrapper">
            <div id="btn-ff">
                <img id="ff-img" src="assets/fastforward1.png" />
            </div>
            <div id="dpad">
                <img id="dpad-img" src="assets/dpad1.png" />
                <div class="dpad-zone" id="btn-up"></div>
                <div class="dpad-zone" id="btn-down"></div>
                <div class="dpad-zone" id="btn-left"></div>
                <div class="dpad-zone" id="btn-right"></div>
            </div>
        </div>
        <div id="action-btns">
            <div id="btn-swap">
                <img id="swap-img" src="assets/swap1.png" />
            </div>
        </div>
    </div>

    <img id="toggle-controls" src="assets/eye1.png" />

    <script>
        const controls  = document.getElementById('touch-controls');
        const toggleBtn = document.getElementById('toggle-controls');
        const dpadImg   = document.getElementById('dpad-img');
        const swapImg   = document.getElementById('swap-img');
        const held      = {};
        let activeDirs  = 0;

        // Default: on for mobile (coarse pointer), off for PC
        let controlsVisible = window.matchMedia('(pointer: coarse)').matches;

        function applyVisibility() {
            controls.style.display  = controlsVisible ? 'flex' : 'none';
            toggleBtn.src = controlsVisible ? 'assets/eye2.png' : 'assets/eye1.png';
        }
        applyVisibility();

        toggleBtn.addEventListener('click', () => {
            controlsVisible = !controlsVisible;
            applyVisibility();
        });

        function startHold(id, fn) {
            if (held[id]) return;
            fn();
            held[id] = setInterval(fn, 150);
        }

        function stopHold(id) {
            clearInterval(held[id]);
            delete held[id];
        }

        function dpad(id, dc, dr, pressedSrc) {
            const el = document.getElementById(id);
            const press = (e) => {
                e.preventDefault();
                activeDirs++;
                dpadImg.src = pressedSrc;
                startHold(id, () => window.tileGame?.moveCursor(dc, dr));
            };
            const release = (e) => {
                if (e) e.preventDefault();
                stopHold(id);
                activeDirs = Math.max(0, activeDirs - 1);
                if (activeDirs === 0) dpadImg.src = 'assets/dpad1.png';
            };
            el.addEventListener('touchstart',  press,   { passive: false });
            el.addEventListener('touchend',    release, { passive: false });
            el.addEventListener('touchcancel', release);
            el.addEventListener('mousedown',   press);
            el.addEventListener('mouseup',     release);
            el.addEventListener('mouseleave',  release);
        }

        const ffEl = document.getElementById('btn-ff');
        const ffImg = document.getElementById('ff-img');
        const ffPress = (e) => {
            e.preventDefault();
            ffImg.src = 'assets/fastforward2.png';
            const g = window.tileGame;
            if (g && !g.fHeld) {
                g.fHeld = true;
                g.fRepeatTimer = 200;
                g.forcedScrollPixels += 20;
            }
        };
        const ffRelease = () => {
            ffImg.src = 'assets/fastforward1.png';
            const g = window.tileGame;
            if (g) { g.fHeld = false; g.fRepeatTimer = 0; }
        };
        ffEl.addEventListener('touchstart',  ffPress,   { passive: false });
        ffEl.addEventListener('touchend',    ffRelease, { passive: false });
        ffEl.addEventListener('touchcancel', ffRelease);
        ffEl.addEventListener('mousedown',   ffPress);
        ffEl.addEventListener('mouseup',     ffRelease);
        ffEl.addEventListener('mouseleave',  ffRelease);

        dpad('btn-up',    0,  1, 'assets/dpad2.png');
        dpad('btn-right', 1,  0, 'assets/dpad3.png');
        dpad('btn-down',  0, -1, 'assets/dpad4.png');
        dpad('btn-left', -1,  0, 'assets/dpad5.png');

        const swapEl = document.getElementById('btn-swap');
        const swapPress = (e) => {
            e.preventDefault();
            swapImg.src = 'assets/swap2.png';
            window.tileGame?.doSwap();
        };
        const swapRelease = (e) => {
            if (e) e.preventDefault();
            swapImg.src = 'assets/swap1.png';
        };
        swapEl.addEventListener('touchstart',  swapPress,   { passive: false });
        swapEl.addEventListener('touchend',    swapRelease, { passive: false });
        swapEl.addEventListener('touchcancel', swapRelease);
        swapEl.addEventListener('mousedown',   swapPress);
        swapEl.addEventListener('mouseup',     swapRelease);
        swapEl.addEventListener('mouseleave',  swapRelease);
    </script>

    <script type="module" src="./main.js"></script>
</body>

</html>
