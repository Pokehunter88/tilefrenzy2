<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tile Frenzy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -khtml-user-select: none;
            -ms-user-select: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        canvas {
            image-rendering: pixelated !important;
            image-rendering: crisp-edges !important;
        }

        #touch-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px;
            z-index: 100;
            pointer-events: none;

            opacity: 50%;
        }

        @media (pointer: coarse) {
            #touch-controls { display: flex; }
        }

        #dpad {
            position: relative;
            width: 200px;
            height: 200px;
            pointer-events: all;
        }

        #dpad-img {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }

        /* Invisible triangular touch zones over each quadrant */
        .dpad-zone {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        #btn-up    { clip-path: polygon(50% 50%, 0% 0%, 100% 0%); }
        #btn-down  { clip-path: polygon(50% 50%, 0% 100%, 100% 100%); }
        #btn-left  { clip-path: polygon(50% 50%, 0% 0%, 0% 100%); }
        #btn-right { clip-path: polygon(50% 50%, 100% 0%, 100% 100%); }

        #action-btns {
            pointer-events: all;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn-swap {
            width: 172px;
            height: 120px;
            cursor: pointer;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        #swap-img {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>

    <div id="touch-controls">
        <div id="dpad">
            <img id="dpad-img" src="assets/dpad1.png" />
            <div class="dpad-zone" id="btn-up"></div>
            <div class="dpad-zone" id="btn-down"></div>
            <div class="dpad-zone" id="btn-left"></div>
            <div class="dpad-zone" id="btn-right"></div>
        </div>
        <div id="action-btns">
            <div id="btn-swap">
                <img id="swap-img" src="assets/swap1.png" />
            </div>
        </div>
    </div>

    <script>
        const held = {};
        let activeDirs = 0;
        const dpadImg  = document.getElementById('dpad-img');
        const swapImg  = document.getElementById('swap-img');

        function startHold(id, fn) {
            if (held[id]) return;
            fn();
            held[id] = setInterval(fn, 150);
        }

        function stopHold(id) {
            clearInterval(held[id]);
            delete held[id];
        }

        function dpad(id, dc, dr, pressedSrc) {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => {
                e.preventDefault();
                activeDirs++;
                dpadImg.src = pressedSrc;
                startHold(id, () => window.tileGame?.moveCursor(dc, dr));
            }, { passive: false });
            const release = (e) => {
                if (e) e.preventDefault();
                stopHold(id);
                activeDirs = Math.max(0, activeDirs - 1);
                if (activeDirs === 0) dpadImg.src = 'assets/dpad1.png';
            };
            el.addEventListener('touchend',    release, { passive: false });
            el.addEventListener('touchcancel', release);
        }

        dpad('btn-up',    0,  1, 'assets/dpad2.png');
        dpad('btn-right', 1,  0, 'assets/dpad3.png');
        dpad('btn-down',  0, -1, 'assets/dpad4.png');
        dpad('btn-left', -1,  0, 'assets/dpad5.png');

        const swapEl = document.getElementById('btn-swap');
        swapEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            swapImg.src = 'assets/swap2.png';
            window.tileGame?.doSwap();
        }, { passive: false });
        const swapRelease = (e) => {
            if (e) e.preventDefault();
            swapImg.src = 'assets/swap1.png';
        };
        swapEl.addEventListener('touchend',    swapRelease, { passive: false });
        swapEl.addEventListener('touchcancel', swapRelease);
    </script>

    <script type="module" src="./main.js"></script>
</body>

</html>
