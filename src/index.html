<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tile Frenzy</title>
    <style>
        html,
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;

            align-items: center;
            justify-content: center;
        }
